<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#F7F4EF" />
    <title>Pipeline Operativo UXIA</title>

    <!-- Tipografia de marca MediaLab: Lato (texto), Poppins (titulos), Jost (metricas) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Poppins:wght@500;600;700&family=Jost:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind por CDN: el componente usa clases utilitarias de Tailwind.
         Para producción conviene instalar Tailwind como dependencia en lugar del CDN. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Tokens de marca MediaLab Ingenieria disponibles como utilidades Tailwind.
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: '#E8751A',      // naranja de marca
              teal: '#2AABB3',       // teal de marca (acento secundario / superficies claras)
              tealDeep: '#17727A',   // teal profundo accesible (fondos con texto blanco)
              uxgreen: '#00BFA6',    // UXGreen (exito / hecho)
            },
            fontFamily: {
              sans: ["Lato", "Segoe UI", "system-ui", "sans-serif"],
              display: ["Poppins", "Segoe UI Semibold", "sans-serif"],
              metrics: ["Jost", "ui-monospace", "monospace"],
            },
          },
        },
      };
    </script>

    <style>
      body {
        margin: 0;
        background: #F7F4EF;
        font-family: "Lato", "Segoe UI", system-ui, sans-serif;
      }
      /* Titulos con la display de marca */
      h1, h2, h3 { font-family: "Poppins", "Segoe UI Semibold", sans-serif; }

      /* A-1 / WCAG 2.4.7 — foco de teclado visible en toda la app.
         Sobrescribe los `outline-none` de los componentes solo cuando se
         navega con teclado (:focus-visible), sin afectar el clic con mouse. */
      a:focus-visible,
      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible,
      summary:focus-visible,
      [tabindex]:focus-visible {
        outline: 2px solid #E8751A;
        outline-offset: 2px;
        border-radius: 4px;
      }

      /* Impresión del reporte de indicadores: solo se imprime #kpi-report. */
      @media print {
        body * { visibility: hidden !important; }
        #kpi-report, #kpi-report * { visibility: visible !important; }
        #kpi-report { position: absolute; left: 0; top: 0; width: 100%; }
        .no-print { display: none !important; }
        details[id], details { display: block !important; }
      }

      /* Chevron de acordeones (details): rota al abrir para indicar que se despliega. */
      .ops-caret { transition: transform .15s ease; flex-shrink: 0; }
      details[open] > summary .ops-caret { transform: rotate(90deg); }

      /* Modo oscuro del Centro de Operaciones: remapea sus colores fijos de
         Tailwind cuando el contenedor tiene data-ops-theme="dark". */
      /* Fondos — el propio contenedor raíz lleva bg-[#F7F4EF]/text-[#202124], por eso
         se incluye el selector directo además del descendiente (si no, el fondo de la
         página se quedaba claro en modo oscuro). */
      /* Paleta oscura IDÉNTICA a la del Radar (RadarUXIA DARK): negro frío, no café.
         bg #0E1116 · panel #151B23 · panelHi #1B232E · border #28313E · text #E8EDF3
         · dim #8B97A6 · faint #5B6675. */
      [data-ops-theme="dark"],
      [data-ops-theme="dark"] .bg-\[\#F7F4EF\] { background-color: #0E1116 !important; }
      [data-ops-theme="dark"] { color: #E8EDF3 !important; }
      [data-ops-theme="dark"] .bg-white,
      [data-ops-theme="dark"] .bg-\[\#FFFCF7\] { background-color: #151B23 !important; }
      [data-ops-theme="dark"] .bg-\[\#F2F4F7\] { background-color: #1B232E !important; }
      [data-ops-theme="dark"] .bg-\[\#FBFAF7\],
      [data-ops-theme="dark"] .bg-\[\#FFFFFF\] { background-color: #151B23 !important; }
      [data-ops-theme="dark"] .bg-\[\#FFF7E6\],
      [data-ops-theme="dark"] .bg-\[\#FFFCF5\],
      [data-ops-theme="dark"] .bg-\[\#FFF2CC\] { background-color: #2a2410 !important; }
      [data-ops-theme="dark"] .bg-\[\#EAF4F2\] { background-color: #10262a !important; }
      [data-ops-theme="dark"] .bg-\[\#F5F3FF\],
      [data-ops-theme="dark"] .bg-\[\#EDE9FE\] { background-color: #1c1830 !important; }
      [data-ops-theme="dark"] .bg-\[\#EAF2FB\] { background-color: #101c2a !important; }
      [data-ops-theme="dark"] .bg-\[\#E5F5EE\] { background-color: #0f2418 !important; }
      [data-ops-theme="dark"] .bg-\[\#FEF3F2\] { background-color: #2b1614 !important; }
      /* Bordes */
      [data-ops-theme="dark"] .border-\[\#D0D5DD\],
      [data-ops-theme="dark"] .border-\[\#E4DED6\],
      [data-ops-theme="dark"] .border-\[\#D9D2C7\] { border-color: #28313E !important; }
      [data-ops-theme="dark"] .border-\[\#C8BFB3\] { border-color: #3A4553 !important; }
      /* Texto */
      [data-ops-theme="dark"] .text-\[\#1D2939\],
      [data-ops-theme="dark"] .text-\[\#202124\] { color: #E8EDF3 !important; }
      [data-ops-theme="dark"] .text-\[\#344054\] { color: #D2DAE3 !important; }
      [data-ops-theme="dark"] .text-\[\#475467\],
      [data-ops-theme="dark"] .text-\[\#667085\] { color: #8B97A6 !important; }
      [data-ops-theme="dark"] .text-\[\#8b8272\],
      [data-ops-theme="dark"] .text-\[\#98A2B3\] { color: #5B6675 !important; }
      [data-ops-theme="dark"] .text-\[\#17727A\] { color: #4FD1C5 !important; }
      [data-ops-theme="dark"] .text-\[\#B42318\] { color: #f08a80 !important; }
      [data-ops-theme="dark"] .text-\[\#B76E00\],
      [data-ops-theme="dark"] .text-\[\#8A5700\] { color: #e6a94a !important; }
      /* Inputs/selects/textarea: fondo oscuro y texto claro */
      [data-ops-theme="dark"] input,
      [data-ops-theme="dark"] select,
      [data-ops-theme="dark"] textarea { background-color: #1B232E !important; color: #E8EDF3 !important; }
      [data-ops-theme="dark"] input::placeholder,
      [data-ops-theme="dark"] textarea::placeholder { color: #5B6675 !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
